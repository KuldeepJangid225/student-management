<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    </div>
    <nav>
        <a th:href="@{/students}">Home</a>
        <a th:href="@{/logout}" class="logout">Logout</a>
    </nav>
</header>

<!-- ===== MAIN CONTENT ===== -->
<div class="container">

    <div class="page-title">Add Student</div>

    <div class="form-wrapper">
        <form th:action="@{/students}"
              th:object="${student}"
              method="post"
              onsubmit="return validateForm()">

            <!-- First Name -->
            <div class="form-group">
                <label>First Name</label>
                <input type="text" th:field="*{firstName}" required>
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" th:field="*{lastName}" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" required>
            </div>

            <!-- Phone Number -->
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phone_Number}" placeholder="Enter phone number">
            </div>

            <!-- Date of Birth -->
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" th:field="*{dob}">
            </div>

            <!-- Class Name -->
            <div class="form-group">
                <label>Class</label>
                <input type="text" th:field="*{className}">
            </div>

            <!-- Father Name -->
            <div class="form-group">
                <label>Father Name</label>
                <input type="text" th:field="*{fatherName}">
            </div>

            <!-- Mother Name -->
            <div class="form-group">
                <label>Mother Name</label>
                <input type="text" th:field="*{motherName}">
            </div>

            <!-- Address -->
            <div class="form-group">
                <label>Address</label>
                <textarea th:field="*{address}" rows="3" placeholder="Enter full address"></textarea>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button type="submit">Save Student</button>
                <a th:href="@{/students}" class="btn-secondary">Cancel</a>
            </div>

        </form>
    </div>

</div>


</body>
</html>
