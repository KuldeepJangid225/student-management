<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>

<header>

    <nav>
        <a th:href="@{/students}">Home</a>
        <a th:href="@{/logout}" class="logout">Logout</a>
    </nav>
</header>
<!-- ===== MAIN CONTENT ===== -->
<div class="container">

    <div class="header">
        <h2>Student List</h2>
        <a th:href="@{/students/new}" class="btn btn-primary">+ Add Student</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search student by name or email...">
    </div>

    <table id="studentTable">
        <thead>
        <tr>
<!--            <th>ID</th>-->
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
            <th>Address</th>
            <th>DOB</th>
            <th>Father Name</th>
            <th>Mother Name</th>
            <th>Class Name</th>

            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="student : ${students}">
<!--            <td th:text="${student.id}"></td>-->
            <td th:text="${student.firstName + ' ' + student.lastName}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.phone_Number}"></td>
            <td th:text="${student.address}"></td>
            <td th:text="${student.dob}"></td>
            <td th:text="${student.fatherName}"></td>
            <td th:text="${student.motherName}"></td>
            <td th:text="${student.className}"></td>

            <td class="actions">
                <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-edit">Edit</a>
                <a th:href="@{/students/{id}(id=${student.id})}"
                   class="btn btn-delete"
                   onclick="return confirmDelete()">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>


</body>
</html>
